<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<title>Italiensk daglig quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green:    #008C45;
    --green-d:  #00753a;
    --red:      #CD212A;
    --red-d:    #ad1a22;
    --bg:       #fafaf7;
    --card:     #ffffff;
    --ink:      #0d1014;
    --ink-2:    #3a4049;
    --muted:    #8b919b;
    --hairline: #ebe9e3;
    --hairline-2: #d9d6cf;
    --soft-green: #e6f4ec;
    --soft-red:   #fbe9ea;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Geist", system-ui, sans-serif;
    font-feature-settings: "ss01", "cv11";
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 64px 24px 96px;
  }

  /* ── Masthead ───────────────────────────────────── */
  header.mast { margin-bottom: 32px; }
  .flag {
    display: flex; height: 4px; width: 64px; margin-bottom: 18px;
    border-radius: 1px; overflow: hidden;
  }
  .flag span { flex: 1; }
  .flag .g { background: var(--green); }
  .flag .w { background: #fff; border-top: 1px solid var(--hairline-2); border-bottom: 1px solid var(--hairline-2); }
  .flag .r { background: var(--red); }

  h1.title {
    font-family: "Geist", sans-serif;
    font-weight: 600;
    font-size: 32px;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin: 0 0 4px;
    color: var(--ink);
  }
  .lede {
    color: var(--muted); font-size: 14px; margin: 0;
  }

  /* ── Card ───────────────────────────────────────── */
  .card {
    background: var(--card);
    border: 1px solid var(--hairline);
    border-radius: 12px;
    padding: 28px;
    box-shadow: 0 1px 0 #fff inset, 0 8px 24px -16px rgba(13,16,20,0.08);
  }

  /* ── Inputs ─────────────────────────────────────── */
  label.field-label {
    display: block;
    font-family: "Geist Mono", ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  select, input[type=text] {
    width: 100%;
    font-family: "Geist", sans-serif;
    font-size: 16px;
    color: var(--ink);
    background: var(--card);
    border: 1px solid var(--hairline-2);
    border-radius: 8px;
    padding: 12px 14px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  select {
    appearance: none; cursor: pointer;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' fill='none' stroke='%230d1014' stroke-width='1.5' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat; background-position: right 14px center;
    padding-right: 38px;
  }
  input[type=text]:focus, select:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 4px rgba(0,140,69,0.12);
  }
  input.answer-input {
    font-size: 20px;
    font-weight: 500;
    padding: 16px 16px;
  }

  .meta {
    margin-top: 10px;
    font-family: "Geist Mono", monospace;
    font-size: 12px;
    color: var(--muted);
  }

  /* ── Buttons ────────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 10px;
    width: 100%;
    font-family: "Geist", sans-serif;
    font-weight: 500;
    font-size: 14.5px;
    padding: 11px 16px;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background .15s, border-color .15s, transform .08s;
  }
  .btn:active { transform: translateY(0.5px); }
  .btn-primary {
    background: var(--ink); color: #fff; border-color: var(--ink);
  }
  .btn-primary:hover { background: #1d2128; }
  .btn-go {
    background: var(--green); color: #fff; border-color: var(--green-d);
  }
  .btn-go:hover { background: var(--green-d); }
  .btn-ghost {
    background: var(--card); color: var(--ink); border-color: var(--hairline-2);
  }
  .btn-ghost:hover { background: var(--bg); border-color: var(--ink); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  kbd {
    font-family: "Geist Mono", monospace;
    font-size: 11px; font-weight: 500;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.3);
    color: inherit;
    line-height: 1; white-space: nowrap;
  }
  .btn-ghost kbd {
    background: var(--bg); border-color: var(--hairline-2); color: var(--ink-2);
  }

  .row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px;
  }
  .stack > * + * { margin-top: 12px; }

  .qboxes {
    display: flex; flex-wrap: wrap; gap: 5px;
    justify-content: center;
    margin: 14px 0 22px;
  }
  .qbox {
    width: 14px; height: 14px;
    border-radius: 3px;
    background: #fff;
    border: 1px solid var(--line, #d6d3cc);
    transition: background-color .15s ease, border-color .15s ease, transform .15s ease;
  }
  .qbox.is-current {
    border-color: #555;
    transform: scale(1.18);
  }
  .qbox.is-right {
    background: var(--green);
    border-color: var(--green-d);
  }
  .qbox.is-wrong {
    background: var(--red);
    border-color: var(--red-d);
  }

  /* ── Quiz screen ────────────────────────────────── */
  .qhead {
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px;
    margin-bottom: 18px;
  }
  .qhead .form-tag {
    display: inline-flex; align-items: center;
    font-family: "Geist", sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 999px;
    background: var(--green);
    color: #fff;
    box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset;
  }
  .qhead .form-tag .dot { display: none; }
  .qhead.is-verb .form-tag { background: var(--red); }
  .qhead.is-adj  .form-tag { background: #b8842a; }
  .qhead.is-verb-conj .form-tag { background: #2a6db8; }
  .qhead.is-sentence  .form-tag { background: #6f42c1; }
  .qhead #countTag {
    font-family: "Geist Mono", monospace;
    font-size: 12.5px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  /* ── Mode chips (start screen) ──────────────────── */
  .modes {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-top: 8px;
  }
  .mode-chip.is-extra {
    margin-top: 18px;
    opacity: 0.78;
  }
  .mode-chip.is-extra:hover,
  .mode-chip.is-extra.is-active { opacity: 1; }
  .modes-divider {
    grid-column: 1 / -1;
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: "Geist", sans-serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .modes-divider::before,
  .modes-divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line, #d6d3cc);
  }
  .mode-chip {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    font-family: "Geist", sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 12px 14px;
    background: var(--card);
    border: 1px solid var(--hairline-2);
    border-radius: 8px;
    color: var(--ink);
    cursor: pointer;
    transition: border-color .15s, background .15s, color .15s;
    text-align: left;
  }
  .mode-chip:hover { border-color: var(--ink); }
  .mode-chip .num {
    font-family: "Geist Mono", monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-left: 6px;
  }
  .mode-chip .key {
    font-family: "Geist Mono", monospace;
    font-size: 10.5px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--hairline-2);
    border-radius: 4px;
    padding: 2px 6px;
    line-height: 1;
  }
  .mode-chip.is-active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  /* Extras (skjult bak toggle) ───────────────────── */
  .extras-wrap {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px dashed var(--hairline-2);
  }
  .extras-toggle {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--card);
    border: 1px solid var(--hairline-2);
    border-radius: 8px;
    padding: 9px 14px;
    font-family: "Geist", sans-serif;
    font-size: 13px; font-weight: 500;
    color: var(--ink-2); cursor: pointer;
    transition: border-color .15s, background .15s, color .15s;
  }
  .extras-toggle:hover { border-color: var(--ink); color: var(--ink); }
  .extras-toggle .chev {
    display: inline-block;
    transition: transform .15s;
  }
  .extras-wrap.is-open .extras-toggle .chev { transform: rotate(90deg); }
  .extras-content { display: none; }
  .extras-wrap.is-open .extras-content { display: block; }

  /* Bredde-modus: egen seksjon, italiensk-flagg-aksent */
  .bank-section {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px dashed var(--hairline-2);
  }
  .bank-section .field-label {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .bank-section .field-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--green) 0%, var(--green) 33%,
                                       #fff 33%, #fff 66%,
                                       var(--red) 66%, var(--red) 100%);
    opacity: 0.55;
    margin-left: 4px;
  }
  .bank-hint {
    font-family: "Geist Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.02em;
    color: var(--muted);
    margin: -4px 0 12px;
  }
  .mode-chip.is-bank.is-active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .dateSel-wrap.is-dim {
    opacity: 0.4;
    pointer-events: none;
    transition: opacity .2s;
  }

  /* ── Day list (hover preview) ───────────────────── */
  .day-list-wrap { }
  .day-list-toggle {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%;
    background: var(--card);
    border: 1px solid var(--hairline-2);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: "Geist", sans-serif;
    font-size: 16px;
    color: var(--ink); cursor: pointer;
    transition: border-color .15s, background .15s, color .15s;
    text-align: left;
  }
  .day-list-toggle:hover { border-color: var(--ink); }
  .day-list-wrap.is-open .day-list-toggle {
    background: var(--ink); color: #fff; border-color: var(--ink);
  }
  .day-list-toggle .chev {
    display: inline-block;
    font-size: 12px;
    color: var(--muted);
    transition: transform .15s, color .15s;
    margin-left: 12px;
  }
  .day-list-wrap.is-open .day-list-toggle .chev { transform: rotate(180deg); color: #fff; }
  .day-list {
    margin-top: 10px;
    max-height: 260px;
    overflow-y: auto;
    border: 1px solid var(--hairline-2);
    border-radius: 8px;
    background: var(--card);
    display: none;
  }
  .day-list-wrap.is-open .day-list { display: block; }
  .day-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--hairline);
    font-size: 14px;
    transition: background .12s;
  }
  .day-row:last-child { border-bottom: none; }
  .day-row:hover { background: var(--soft-green); }
  .day-row.is-selected {
    background: var(--ink); color: #fff;
  }
  .day-row.is-selected:hover { background: #1d2128; }
  .day-row .day-count {
    font-family: "Geist Mono", monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .day-row.is-selected .day-count { color: rgba(255,255,255,0.7); }

  /* ── Side preview panel ─────────────────────────── */
  .date-preview {
    position: fixed;
    top: 64px;
    left: calc(50% + 344px);
    width: 360px;
    max-height: calc(100vh - 96px);
    overflow-y: auto;
    overscroll-behavior: contain;
    background: var(--card);
    border: 1px solid var(--hairline);
    border-radius: 12px;
    padding: 20px 22px;
    box-shadow: 0 8px 24px -16px rgba(13,16,20,0.14);
    opacity: 0;
    transform: translateX(-6px);
    pointer-events: none;
    transition: opacity .15s, transform .15s;
    z-index: 50;
  }
  .date-preview.is-visible {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }
  .date-preview .preview-close {
    position: absolute;
    top: 10px; right: 12px;
    background: none; border: none;
    font-size: 18px; line-height: 1;
    color: var(--muted); cursor: pointer;
    padding: 4px 6px; border-radius: 4px;
  }
  .date-preview .preview-close:hover { color: var(--ink); background: var(--bg); }
  .date-preview h3 {
    font-family: "Geist", sans-serif;
    font-size: 14px; font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
    padding-right: 24px;
  }
  .date-preview .preview-meta {
    font-family: "Geist Mono", monospace;
    font-size: 11px; color: var(--muted);
    margin-bottom: 14px;
  }
  .date-preview .preview-section { margin-top: 14px; }
  .date-preview .preview-section:first-of-type { margin-top: 0; }
  .date-preview .preview-section h4 {
    font-family: "Geist Mono", monospace;
    font-size: 10.5px; letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 6px;
    font-weight: 500;
  }
  .date-preview ul.preview-list {
    list-style: none; margin: 0; padding: 0;
    font-size: 13px;
    line-height: 1.55;
  }
  .date-preview ul.preview-list li {
    display: flex; justify-content: space-between; gap: 12px;
    padding: 3px 0;
    border-bottom: 1px dashed var(--hairline);
  }
  .date-preview ul.preview-list li:last-child { border-bottom: none; }
  .date-preview .pw-no  { color: var(--ink-2); }
  .date-preview .pw-it  { color: var(--ink); font-weight: 500; text-align: right; }
  @media (max-width: 1080px) {
    .date-preview { display: none; }
  }
  .mode-chip.is-active .num,
  .mode-chip.is-active .key {
    color: rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.22);
  }

  /* ── Form callout (above prompt) ────────────────── */
  .form-callout {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: "Geist", sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.01em;
    padding: 6px 14px;
    border-radius: 999px;
    margin-bottom: 18px;
    background: var(--bg);
    border: 1px solid var(--hairline-2);
    color: var(--ink-2);
    text-transform: uppercase;
  }
  .form-callout::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
  }
  .form-callout.entall,
  .form-callout.flertall { background: var(--soft-green); border-color: rgba(0,140,69,0.3); color: var(--green-d); }
  .form-callout.adj-inflect {
    background: #fff5e0; border-color: #e8c879; color: #8a6411;
  }
  .form-callout.adj-inflect::before { content: "↳"; background: none; width: auto; height: auto; font-size: 13px; line-height: 1; }
  .form-callout.is-hidden { display: none; }

  .progress {
    height: 3px; background: var(--hairline);
    border-radius: 999px; overflow: hidden;
    margin-bottom: 28px;
  }
  .progress > div {
    height: 100%;
    background: linear-gradient(90deg, var(--green) 0%, var(--green) 33%,
                                       #ffffff 33%, #ffffff 66%,
                                       var(--red) 66%, var(--red) 100%);
    background-size: 100% 100%;
    transition: width .35s ease;
  }

  .prompt-block {
    padding: 18px 0 28px;
    border-bottom: 1px solid var(--hairline);
    margin-bottom: 24px;
    text-align: center;
  }
  .prompt-word {
    font-family: "Geist", sans-serif;
    font-weight: 600;
    font-size: clamp(40px, 7vw, 56px);
    line-height: 1.05;
    letter-spacing: -0.025em;
    color: var(--ink);
    margin: 0;
  }

  /* ── Feedback ───────────────────────────────────── */
  .feedback {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 14.5px;
    border: 1px solid;
  }
  .tts-word {
    cursor: pointer;
    border-bottom: 1px dotted transparent;
    transition: color .12s, border-color .12s, background .12s;
    border-radius: 3px;
    padding: 0 2px;
  }
  .tts-word:hover {
    color: var(--green-d);
    border-bottom-color: currentColor;
  }
  .tts-word.is-playing {
    background: var(--soft-green);
    color: var(--green-d);
  }
  .tts-toggle {
    background: none; border: 1px solid var(--hairline-2);
    border-radius: 999px;
    padding: 3px 10px;
    font: 600 11px "Geist Mono", monospace;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--ink-2); cursor: pointer;
    transition: border-color .15s, color .15s, background .15s;
  }
  .tts-toggle:hover { border-color: var(--ink); color: var(--ink); }
  .tts-toggle.is-off { color: var(--muted); opacity: 0.6; }
  .feedback.good {
    color: var(--green-d);
    border-color: rgba(0,140,69,0.25);
    background: var(--soft-green);
  }
  .feedback.bad {
    color: var(--red-d);
    border-color: rgba(205,33,42,0.22);
    background: var(--soft-red);
  }
  .feedback .answer {
    font-weight: 600;
    color: var(--ink);
  }
  .feedback .nudge {
    display: block; margin-top: 6px;
    font-family: "Geist Mono", monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  .adj-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px 14px;
    margin-top: 8px;
  }
  .adj-cell {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 10px;
    padding: 4px 0;
    border-bottom: 1px dashed rgba(0,0,0,0.08);
  }
  .adj-cell em {
    font-style: normal;
    font-family: "Geist Mono", monospace;
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .adj-cell b {
    font-weight: 600;
    color: var(--ink);
  }

  /* ── End screen ─────────────────────────────────── */
  .end-title {
    font-family: "Geist", sans-serif;
    font-weight: 600;
    font-size: 28px;
    letter-spacing: -0.02em;
    margin: 0 0 4px;
  }
  .end-sub {
    color: var(--muted); margin: 0 0 22px; font-size: 14px;
  }
  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    margin: 18px 0 24px;
  }
  .stat {
    text-align: center;
    padding: 16px 10px;
    background: var(--bg);
    border: 1px solid var(--hairline);
    border-radius: 8px;
  }
  .stat b {
    display: block;
    font-family: "Geist", sans-serif;
    font-weight: 600;
    font-size: 26px;
    line-height: 1;
    color: var(--ink);
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .stat span {
    font-family: "Geist Mono", monospace;
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .missed-title {
    font-family: "Geist Mono", monospace;
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted);
    margin: 0;
  }
  .missed-head {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 12px; margin: 0 0 12px;
  }
  .missed-total {
    font-family: "Geist Mono", monospace;
    font-size: 11px; letter-spacing: 0.04em;
    color: var(--red-d);
  }

  .miss-chart { margin: 0 0 22px; }
  .bar-row {
    display: grid;
    grid-template-columns: minmax(110px, max-content) 1fr auto;
    grid-template-rows: auto auto;
    column-gap: 14px;
    row-gap: 4px;
    padding: 10px 0;
    border-bottom: 1px solid var(--hairline);
    align-items: center;
    cursor: pointer;
    position: relative;
    transition: background .12s;
  }
  .bar-row:hover { background: rgba(13,16,20,0.02); }
  .bar-row .bar-chev {
    position: absolute;
    right: 0; top: 16px;
    width: 8px; height: 8px;
    border-right: 1.5px solid var(--muted);
    border-bottom: 1.5px solid var(--muted);
    transform: rotate(45deg);
    transition: transform .15s;
  }
  .bar-row .bar-count { padding-right: 16px; }
  .bar-row.is-open .bar-chev { transform: rotate(225deg); }
  .bar-attempts {
    grid-row: 3; grid-column: 1 / -1;
    display: none;
    margin-top: 8px;
    padding: 10px 12px;
    background: var(--soft-red);
    border: 1px solid rgba(205,33,42,0.18);
    border-radius: 6px;
  }
  .bar-row.is-open .bar-attempts { display: block; }
  .bar-attempts .attempts-title {
    font-family: "Geist Mono", monospace;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--red-d); margin: 0 0 6px;
  }
  .bar-attempts ol {
    margin: 0; padding-left: 22px;
    font-size: 13.5px; color: var(--ink-2);
  }
  .bar-attempts li {
    padding: 2px 0;
    font-family: "Geist Mono", monospace;
  }
  .bar-attempts li.empty {
    color: var(--muted); font-style: italic;
    font-family: "Geist", sans-serif;
    list-style: none; margin-left: -22px;
  }
  .bar-row:last-child { border-bottom: none; }
  .bar-word {
    grid-row: 1; grid-column: 1;
    display: flex; align-items: baseline; gap: 8px;
    font-weight: 500; color: var(--ink);
    font-size: 15px;
  }
  .bar-word .bar-tag {
    font-family: "Geist Mono", monospace;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); font-weight: 400;
  }
  .bar-units {
    grid-row: 1; grid-column: 2;
    display: flex; gap: 3px; flex-wrap: wrap; align-items: center;
    min-height: 18px;
  }
  .bar-count {
    grid-row: 1; grid-column: 3;
    font-family: "Geist Mono", monospace;
    font-size: 13px; color: var(--red-d); font-weight: 600;
    min-width: 22px; text-align: right;
  }
  .bar-answer {
    grid-row: 2; grid-column: 1 / -1;
    font-size: 12.5px; color: var(--muted);
    font-style: italic;
    padding-left: 2px;
  }
  .unit {
    width: 11px; height: 18px;
    background: var(--red);
    opacity: 0.78;
    border-radius: 2px;
    flex: 0 0 auto;
  }
  .unit:nth-child(5n) { background: var(--red-d); opacity: 0.95; }

  @media (max-width: 480px) {
    .bar-row { grid-template-columns: 1fr auto; }
    .bar-word { grid-column: 1; }
    .bar-count { grid-column: 2; grid-row: 1; }
    .bar-units { grid-row: 2; grid-column: 1 / -1; }
    .bar-answer { grid-row: 3; }
  }

  .hidden { display: none !important; }

  .keyhelp {
    margin-top: 18px;
    text-align: center;
    font-family: "Geist Mono", monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  .keyhelp kbd {
    background: var(--card); border-color: var(--hairline-2); color: var(--ink-2);
    margin: 0 2px;
  }

  @media (max-width: 480px) {
    .row { grid-template-columns: 1fr; }
    .wrap { padding-top: 40px; }
    .card { padding: 22px; }
  }

<div class="wrap">

  <header class="mast">
    <div class="flag" aria-hidden="true">
      <span class="g"></span><span class="w"></span><span class="r"></span>
    </div>
    <h1 class="title">Daglig quiz</h1>
    <p class="lede">Velg en dag og test deg selv.</p>
  </header>

  <!-- ── START ──────────────────────────────────────── -->
  <section id="screen-start" class="card">
    <div class="weekSel-wrap" id="weekSelWrap" style="margin-bottom:16px">
      <label class="field-label">Uke</label>
      <select id="weekSel"></select>
    </div>
    <div class="dateSel-wrap" id="dateSelWrap">
      <label class="field-label">Dato</label>
      <select id="dateSel" hidden></select>
      <div class="day-list-wrap" id="dayListWrap">
        <button type="button" class="day-list-toggle" id="dayListToggle" aria-expanded="false" aria-haspopup="listbox">
          <span id="dayListToggleLabel">—</span>
          <span class="chev" aria-hidden="true">▾</span>
        </button>
        <div class="day-list" id="dayList" role="listbox"></div>
      </div>
      <div class="meta" id="meta"></div>
    </div>
    <aside class="date-preview" id="datePreview" aria-hidden="true"></aside>

    <label class="field-label" style="margin-top:20px">Hva vil du øve på?</label>
    <div class="modes" id="modes" role="group">
      <button type="button" class="mode-chip is-active" data-mode="nouns">
        <span>Substantiv<span class="num" data-count="nouns">10</span></span>
        <span class="key">1</span>
      </button>
      <button type="button" class="mode-chip" data-mode="adjectives">
        <span>Adjektiv<span class="num" data-count="adjectives">10</span></span>
        <span class="key">2</span>
      </button>
      <button type="button" class="mode-chip" data-mode="verbs">
        <span>Verb<span class="num" data-count="verbs">10</span></span>
        <span class="key">3</span>
      </button>
      <button type="button" class="mode-chip" data-mode="all">
        <span>Alt<span class="num" data-count="all">30</span></span>
        <span class="key">4</span>
      </button>
      <button type="button" class="mode-chip is-bank" data-mode="bank-week" style="grid-column: 1 / -1">
        <span>Uke (tilfeldig)<span class="num" data-count="bank-week">0</span></span>
      </button>
    </div>

    <div class="extras-wrap" id="extrasWrap">
      <button type="button" class="extras-toggle" id="extrasToggle" aria-expanded="false">

            <span>Setninger<span class="num" data-count="sentences">8</span></span>

          </button>
        </div>

          <div class="modes" id="modesBank" role="group">
            <button type="button" class="mode-chip is-bank" data-mode="bank-nouns">

            </button>

            </button>

              <span>Verb<span class="num" data-count="bank-verbs">0</span></span>
              <span class="key">9</span>
            </button>

              <span>Alt<span class="num" data-count="bank-all">0</span></span>

            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="stack" style="margin-top:18px">
      <button class="btn btn-go" id="startBtn">
        Start quiz <kbd>Enter</kbd>
      </button>
    </div>

    <div class="keyhelp">

    </div>

      </button>

      </button>
    </div>
  </section>
</div>

const ISC_VERBS = new Set(["finire","capire","preferire","pulire","spedire","tradire","unire","costruire","restituire"]);

function conjugate(it) {
  if (IRREG_CONJ[it]) return IRREG_CONJ[it].slice();
  const ending = it.slice(-3);
  let stem = it.slice(0, -3);
  if (ending === "are") {
    const last2 = stem.slice(-2);
    const lastChar = stem.slice(-1);
    let stemTu = stem, stemNoi = stem;
    if (last2 === "ci" || last2 === "gi") {
      stemTu = stem.slice(0, -1);
      stemNoi = stem.slice(0, -1);
    } else if (lastChar === "c" || lastChar === "g") {
      stemTu = stem + "h";
      stemNoi = stem + "h";
    }
    return [
      stem + "o", stemTu + "i", stem + "a",
      stemNoi + "iamo", stem + "ate", stem + "ano"
    ];
  }
  if (ending === "ere") {
    return [stem+"o", stem+"i", stem+"e", stem+"iamo", stem+"ete", stem+"ono"];
  }
  if (ending === "ire") {
    if (ISC_VERBS.has(it)) {
      return [stem+"isco", stem+"isci", stem+"isce", stem+"iamo", stem+"ite", stem+"iscono"];
    }
    return [stem+"o", stem+"i", stem+"e", stem+"iamo", stem+"ite", stem+"ono"];
  }
  return null;
}

const NO_PRESENT_IRREG = {
  "å være": "er", "å ha": "har", "å gjøre": "gjør",
  "å si": "sier", "å spørre": "spør",
  "å lage mat": "lager mat"
};
function noPresent(noInf) {
  if (NO_PRESENT_IRREG[noInf]) return NO_PRESENT_IRREG[noInf];
  const v = noInf.replace(/^å /, "");
  if (/[aeiouyæøå]$/.test(v)) return v + "r";
  return v + "er";
}

function pickRandom(arr, n) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a.slice(0, Math.min(n, a.length));
}

function bankPool(kind) {
  const out = [];
  for (const day of DAILY_QUIZZES) {
    if (kind === "nouns")      for (const n of day.nouns)      out.push(n);
    if (kind === "verbs")      for (const v of day.verbs)      out.push(v);
    if (kind === "adjectives") for (const a of day.adjectives) out.push(a);
  }
  return out;
}

function isoWeek(iso) {
  const d = new Date(iso + "T00:00:00Z");
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
}

function weekKey(iso) {
  const d = new Date(iso + "T00:00:00Z");
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  return d.getUTCFullYear() + "-W" + String(isoWeek(iso)).padStart(2, "0");
}

function daysInWeek(wk) {
  return DAILY_QUIZZES.filter(d => weekKey(d.date) === wk);
}

function bankPoolWeek(kind, wk) {
  const out = [];
  for (const day of daysInWeek(wk)) {
    if (kind === "nouns")      for (const n of day.nouns)      out.push(n);
    if (kind === "verbs")      for (const v of day.verbs)      out.push(v);
    if (kind === "adjectives") for (const a of day.adjectives) out.push(a);
  }
  return out;
}

  };
  const addAdj = (a) => {
    if (!a.ms || !a.fs || !a.mp || !a.fp) return;
    const adjForms = [
      { key: "ms", label: "hankjønn entall" },
      { key: "fs", label: "hunkjønn entall" },
      { key: "mp", label: "hankjønn flertall" },
      { key: "fp", label: "hunkjønn flertall" }
    ];
    const pick = adjForms[Math.floor(Math.random() * adjForms.length)];
    qs.push({
      kind: "adj", type: "Adjektiv",
      form: pick.label, formClass: "adj-inflect", showCallout: true,
      tag: "adj.",
      prompt: a.no, answer: a[pick.key],
      ms: a.ms, fs: a.fs, mp: a.mp, fp: a.fp
    });
  };

  if (mode === "bank-nouns") {
    for (const n of pickRandom(bankPool("nouns"), total)) addNoun(n);
  } else if (mode === "bank-verbs") {
    for (const v of pickRandom(bankPool("verbs"), total)) addVerb(v);
  } else if (mode === "bank-adjectives") {
    for (const a of pickRandom(bankPool("adjectives"), total)) addAdj(a);
  } else if (mode === "bank-all") {
    const nounShare = Math.ceil(total / 3);
    const verbShare = Math.ceil(total / 3);
    const adjShare = total - nounShare - verbShare;
    for (const n of pickRandom(bankPool("nouns"), nounShare)) addNoun(n);
    for (const v of pickRandom(bankPool("verbs"), verbShare)) addVerb(v);
    for (const a of pickRandom(bankPool("adjectives"), adjShare)) addAdj(a);
  } else if (mode === "bank-week") {
    const wk = $("weekSel").value;
    const nouns = bankPoolWeek("nouns", wk);
    const verbs = bankPoolWeek("verbs", wk);
    const adjs  = bankPoolWeek("adjectives", wk);
    const nounShare = Math.ceil(count / 3);
    const verbShare = Math.ceil(count / 3);
    const adjShare  = count - nounShare - verbShare;
    for (const n of pickRandom(nouns, nounShare)) addNoun(n);
    for (const v of pickRandom(verbs, verbShare)) addVerb(v);
    for (const a of pickRandom(adjs,  adjShare))  addAdj(a);
  }

  for (let i = qs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [qs[i], qs[j]] = [qs[j], qs[i]];
  }
  return qs;
}

function buildQuestions(day, mode) {
  const qs = [];
  if (mode === "all" || mode === "nouns") {
    for (const n of day.nouns) {
      const usePl = Math.random() < 0.5;
      const noPl = n.noPl || n.no;
      const norskPrompt = usePl ? noPl : n.no;
      const ambiguous = (n.no === noPl);
      qs.push({
        kind: "noun",
        type: "Substantiv",
        form: usePl ? "flertall" : "entall",
        formClass: ambiguous ? (usePl ? "flertall" : "entall") : "",
        showCallout: ambiguous,
        tag: "subst.",
        prompt: norskPrompt,
        answer: usePl ? n.pl : n.sg,
        sg: n.sg, pl: n.pl
      });
    }
  }
  if (mode === "all" || mode === "verbs") {
    for (const v of day.verbs) {
      qs.push({
        kind: "verb",
        type: "Verb",
        form: "",
        formClass: "",
        showCallout: false,
        tag: "verb",
        prompt: v.no,
        answer: v.it
      });
    }
  }
  if (mode === "verbs-conj") {
    for (const v of day.verbs) {
      const conj = conjugate(v.it);
      if (!conj) continue;
      const p = PERSONS[Math.floor(Math.random() * PERSONS.length)];
      const noPres = noPresent(v.no);
      qs.push({
        kind: "verb-conj",
        type: "Verb (presens)",
        form: PERSON_LABELS[p.idx],
        formClass: "",
        showCallout: false,
        tag: "verb",
        prompt: p.no + " " + noPres,
        answer: conj[p.idx],
        personIdx: p.idx,
        infinitive: v.it,
        noInfinitive: v.no,
        conjAll: conj
      });
    }
  }
  if (mode === "all" || mode === "adjectives") {
    const adjForms = [
      { key: "ms", label: "hankjønn entall" },
      { key: "fs", label: "hunkjønn entall" },
      { key: "mp", label: "hankjønn flertall" },
      { key: "fp", label: "hunkjønn flertall" }
    ];
    for (const a of day.adjectives) {
      if (!a.ms || !a.fs || !a.mp || !a.fp) continue;
      const pick = adjForms[Math.floor(Math.random() * adjForms.length)];
      qs.push({
        kind: "adj",
        type: "Adjektiv",
        form: pick.label,
        formClass: "adj-inflect",
        showCallout: true,
        tag: "adj.",
        prompt: a.no,
        answer: a[pick.key],
        ms: a.ms, fs: a.fs, mp: a.mp, fp: a.fp
      });
    }
  }
  if (mode === "sentences") {
    const ss = buildSentences(day, 8);
    for (const s of ss) qs.push(s);
  }
  for (let i = qs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [qs[i], qs[j]] = [qs[j], qs[i]];
  }
  return qs;
}

/* ── Sentence generator (templates) ───────────────────── */
const ESSERE = IRREG_CONJ["essere"];
const NO_ADJ_PL_IRREG = {
  "liten": "små", "gammel": "gamle",
  "vakker": "vakre"
};
function noAdjPl(no) {
  const main = no.replace(/\s*\(.*\)$/, "");
  if (NO_ADJ_PL_IRREG[main]) return NO_ADJ_PL_IRREG[main];
  if (main.endsWith("e")) return main;
  if (main.endsWith("ig")) return main + "e";
  if (main.endsWith("en")) return main.slice(0, -2) + "ne";
  if (main.endsWith("el")) return main.slice(0, -2) + "le";
  if (main.endsWith("er")) return main.slice(0, -2) + "re";
  return main + "e";
}
const SENTENCE_VERB_BLACKLIST = new Set(["piacere"]);

const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

function nounGender(n) {
  const first = n.pl.trim().split(/\s+/)[0];
  return first === "le" ? "f" : "m";
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildSentences(day, count) {
  const out = [];
  const verbs = day.verbs.filter(v => conjugate(v.it) && !SENTENCE_VERB_BLACKLIST.has(v.it));
  const adjs = day.adjectives.filter(a => a.ms && a.fs && a.mp && a.fp);
  // Only countable nouns (Norwegian sg ≠ pl) — avoids "Regn er store" awkwardness
  const nouns = day.nouns.filter(n => (n.noPl || n.no) !== n.no);
  if (nouns.length === 0 || verbs.length === 0 || adjs.length === 0) return out;

  // T1: subject pronoun + essere + adjective (verb-conj × adj-agreement, sg/pl)
  const t1 = [];
  for (const a of adjs) {
    for (let pi = 0; pi < 6; pi++) {
      const p = PERSONS[pi];
      const isPl = pi >= 3;
      const adjIt = isPl ? a.mp : a.ms;
      const adjNo = isPl ? noAdjPl(a.no) : a.no.replace(/\s*\(.*\)$/, "");
      t1.push({
        no: cap(p.no) + " er " + adjNo + ".",
        it: cap(ESSERE[pi]) + " " + adjIt + "."
      });
    }
  }

  // T2: noun-pl + sono + adj-pl (noun gender drives adj form)
  const t2 = [];
  for (const n of nouns) {
    const g = nounGender(n);
    for (const a of adjs) {
      const adjIt = g === "f" ? a.fp : a.mp;
      const adjNo = noAdjPl(a.no);
      t2.push({
        no: cap(n.noPl) + " er " + adjNo + ".",
        it: cap(n.pl) + " sono " + adjIt + "."
      });
    }
  }

  // T3: subject + verb-pres + adj-pl + noun-pl (verb conj + noun art + adj agreement)
  const t3 = [];
  for (const v of verbs) {
    const conj = conjugate(v.it);
    const noPres = noPresent(v.no);
    for (const n of nouns) {
      const g = nounGender(n);
      for (const a of adjs) {
        const adjIt = g === "f" ? a.fp : a.mp;
        const adjNo = noAdjPl(a.no);
        for (let pi = 0; pi < 6; pi++) {
          const p = PERSONS[pi];
          t3.push({
            no: cap(p.no) + " " + noPres + " " + adjNo + " " + n.noPl + ".",
            it: cap(conj[pi]) + " " + n.pl + " " + adjIt + "."
          });
        }
      }
    }
  }

  shuffle(t1); shuffle(t2); shuffle(t3);

  // Quota: 2 from T1, 2 from T2, rest from T3 (default 8 → 2+2+4)
  const picked = [];
  const take = (list, n) => { for (let i = 0; i < n && i < list.length; i++) picked.push(list[i]); };
  take(t1, 2);
  take(t2, 2);
  take(t3, count - picked.length);
  shuffle(picked);

  for (const t of picked) {
    out.push({
      kind: "sentence",
      type: "Setning",
      form: "",
      formClass: "",
      showCallout: false,
      tag: "setning",
      prompt: t.no,
      answer: t.it,
      itFull: t.it
    });
  }
  return out;
}

const state = {
  queue: [], total: 0, asked: 0, uniqueAsked: 0, firstTryRight: 0,
  attempts: 0, correctAttempts: 0,
  askedKeys: null, missed: [], current: null, currentFirstTry: true,
  awaitingAdvance: false, lastDay: null,
  mode: "nouns", lastMode: "nouns"
};

const $ = id => document.getElementById(id);

function init() {
  const wkSel = $("weekSel");
  const weeks = [...new Set(DAILY_QUIZZES.map(d => weekKey(d.date)))]
    .sort((a,b) => b.localeCompare(a));
  for (const wk of weeks) {
    const opt = document.createElement("option");
    opt.value = wk;
    opt.textContent = "Uke " + parseInt(wk.split("-W")[1], 10);
    wkSel.appendChild(opt);
  }
  wkSel.addEventListener("change", () => {
    rebuildDateOptions();
    buildDayList();
    updateMeta();
    updateDateComboLabel();
  });

  rebuildDateOptions();
  updateMeta();
  updateDateComboLabel();
  $("dateSel").addEventListener("change", () => { updateMeta(); renderDayList(); updateDateComboLabel(); });

  const ttsBtn = $("ttsToggle");
  if (ttsBtn) {
    TTS.syncButton();
    ttsBtn.addEventListener("click", () => TTS.toggle());
  }

  document.addEventListener("click", (e) => {
    const el = e.target.closest(".tts-word");
    if (!el) return;
    const word = el.getAttribute("data-tts");
    if (!word) return;
    document.querySelectorAll(".tts-word.is-playing").forEach(n => n.classList.remove("is-playing"));
    el.classList.add("is-playing");
    setTimeout(() => el.classList.remove("is-playing"), 1200);
    const wasEnabled = TTS.enabled;
    TTS.enabled = true;
    TTS.speak(word);
    TTS.enabled = wasEnabled;
  });

  buildDayList();
  const toggle = $("dayListToggle");
  const wrap = $("dayListWrap");
  toggle.addEventListener("click", () => {
    const open = wrap.classList.toggle("is-open");
    toggle.setAttribute("aria-expanded", open ? "true" : "false");
    if (open) showDatePreview($("dateSel").value);
    else hideDatePreview();
  });
  $("dayList").addEventListener("mouseleave", () => {
    if (wrap.classList.contains("is-open")) showDatePreview($("dateSel").value);
  });

  const exWrap = $("extrasWrap");
  const exToggle = $("extrasToggle");
  exToggle.addEventListener("click", () => {
    const open = exWrap.classList.toggle("is-open");
    exToggle.setAttribute("aria-expanded", open ? "true" : "false");
    $("extrasToggleLabel").textContent = open ? "Skjul flere alternativer" : "Vis flere alternativer";
  });
  document.addEventListener("click", (e) => {
    const panel = $("datePreview");
    if (!panel.classList.contains("is-visible")) return;
    if (panel.contains(e.target)) return;
    if ($("dayList").contains(e.target)) return;
    if (toggle.contains(e.target)) return;
    hideDatePreview();
  });

  document.querySelectorAll(".mode-chip").forEach(chip => {
    chip.addEventListener("click", () => setMode(chip.dataset.mode));
  });

  $("startBtn").addEventListener("click", startQuiz);
  $("answerForm").addEventListener("submit", e => { e.preventDefault(); submitAnswer(); });
  $("skipBtn").addEventListener("click", () => { $("answerInput").value = ""; submitAnswer(); });
  $("nextBtn").addEventListener("click", advance);
  $("restartBtn").addEventListener("click", goHome);
  $("againBtn").addEventListener("click", () => {
    if (state.lastDay) startQuizFor(state.lastDay, state.lastMode);
  });

  document.addEventListener("keydown", globalKeys);
}

function updateDateComboLabel() {
  const sel = $("dateSel");
  const day = DAILY_QUIZZES.find(d => d.date === sel.value);
  if (!day) { $("dayListToggleLabel").textContent = "—"; return; }
  const total = day.nouns.length + day.verbs.length + day.adjectives.length;
  $("dayListToggleLabel").textContent = formatDate(day.date) + "  ·  " + total + " ord";
}

function rebuildDateOptions() {
  const sel = $("dateSel");
  const wk = $("weekSel").value;
  const filtered = DAILY_QUIZZES.filter(d => weekKey(d.date) === wk)
    .sort((a,b) => b.date.localeCompare(a.date));
  sel.innerHTML = "";
  for (const d of filtered) {
    const opt = document.createElement("option");
    opt.value = d.date;
    const total = d.nouns.length + d.verbs.length + d.adjectives.length;
    opt.textContent = formatDate(d.date) + "  ·  " + total + " ord";
    sel.appendChild(opt);
  }
}

function buildDayList() {
  const list = $("dayList");
  const wk = $("weekSel").value;
  const sorted = DAILY_QUIZZES
    .filter(d => weekKey(d.date) === wk)
    .sort((a,b) => b.date.localeCompare(a.date));
  list.innerHTML = "";
  for (const d of sorted) {
    const row = document.createElement("div");
    row.className = "day-row";
    row.dataset.date = d.date;
    row.setAttribute("role", "option");
    const total = d.nouns.length + d.verbs.length + d.adjectives.length;
    row.innerHTML =
      '<span class="day-label">' + formatDate(d.date) + '</span>' +
      '<span class="day-count">' + total + ' ord</span>';
    row.addEventListener("mouseenter", () => showDatePreview(d.date));
    row.addEventListener("click", () => {
      $("dateSel").value = d.date;
      updateMeta();
      renderDayList();
      updateDateComboLabel();
      $("dayListToggle").click();
    });
    list.appendChild(row);
  }
  renderDayList();
}

function renderDayList() {
  const cur = $("dateSel").value;
  document.querySelectorAll("#dayList .day-row").forEach(r => {
    r.classList.toggle("is-selected", r.dataset.date === cur);
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  })[c]);
}

function showDatePreview(date) {
  const day = DAILY_QUIZZES.find(d => d.date === date);
  if (!day) return;
  const panel = $("datePreview");
  const total = day.nouns.length + day.verbs.length + day.adjectives.length;
  const nounsHtml = day.nouns.map(n =>
    '<li><span class="pw-no">' + escapeHtml(n.no) + '</span>' +
    '<span class="pw-it">' + escapeHtml(n.sg) + '</span></li>'
  ).join("");
  const verbsHtml = day.verbs.map(v =>
    '<li><span class="pw-no">' + escapeHtml(v.no) + '</span>' +
    '<span class="pw-it">' + escapeHtml(v.it) + '</span></li>'
  ).join("");
  const adjHtml = day.adjectives.map(a =>
    '<li><span class="pw-no">' + escapeHtml(a.no) + '</span>' +
    '<span class="pw-it">' + escapeHtml(a.ms) + " / " + escapeHtml(a.fs) + '</span></li>'
  ).join("");
  panel.innerHTML =
    '<button type="button" class="preview-close" aria-label="Lukk">×</button>' +
    '<h3>' + formatDate(date) + '</h3>' +
    '<div class="preview-meta">' + total + ' ord · ' +
      day.nouns.length + ' subst · ' +
      day.verbs.length + ' verb · ' +
      day.adjectives.length + ' adj</div>' +
    '<div class="preview-section"><h4>Substantiv</h4><ul class="preview-list">' + nounsHtml + '</ul></div>' +
    '<div class="preview-section"><h4>Verb</h4><ul class="preview-list">' + verbsHtml + '</ul></div>' +
    '<div class="preview-section"><h4>Adjektiv (m / f)</h4><ul class="preview-list">' + adjHtml + '</ul></div>';
  panel.classList.add("is-visible");
  panel.setAttribute("aria-hidden", "false");
  const closeBtn = panel.querySelector(".preview-close");
  if (closeBtn) closeBtn.addEventListener("click", hideDatePreview);
}

function hideDatePreview() {
  const panel = $("datePreview");
  panel.classList.remove("is-visible");
  panel.setAttribute("aria-hidden", "true");
}

function formatDate(iso) {
  const [y,m,d] = iso.split("-");
  return d + "." + m + "." + y;
}

function updateMeta() {
  const date = $("dateSel").value;
  const day = DAILY_QUIZZES.find(d => d.date === date);
  if (!day) { $("meta").textContent = ""; return; }
  $("meta").textContent =
    day.nouns.length + " substantiv · " +
    day.verbs.length + " verb · " +
    day.adjectives.length + " adjektiv";
  const bankN = bankPool("nouns").length;
  const bankV = bankPool("verbs").length;
  const bankA = bankPool("adjectives").length;
  const counts = {
    all: day.nouns.length + day.verbs.length + day.adjectives.length,
    nouns: day.nouns.length,
    verbs: day.verbs.length,
    "verbs-conj": day.verbs.length,
    adjectives: day.adjectives.length,
    sentences: 8,
    "bank-nouns": Math.min(BANK_SAMPLE_SIZE, bankN) + " / " + bankN,
    "bank-verbs": Math.min(BANK_SAMPLE_SIZE, bankV) + " / " + bankV,
    "bank-adjectives": Math.min(BANK_SAMPLE_SIZE, bankA) + " / " + bankA,
    "bank-all": BANK_SAMPLE_SIZE + " / " + (bankN + bankV + bankA),
    "bank-week": (function() {
      const wk = $("weekSel").value;
      const tot = bankPoolWeek("nouns", wk).length
                + bankPoolWeek("verbs", wk).length
                + bankPoolWeek("adjectives", wk).length;
      return Math.min(30, tot) + " / " + tot;
    })()
  };
  document.querySelectorAll(".mode-chip .num").forEach(el => {
    const k = el.dataset.count;
    if (counts[k] != null) el.textContent = " " + counts[k];
  });
}

function setMode(mode) {
  state.mode = mode;
  document.querySelectorAll(".mode-chip").forEach(c => {
    c.classList.toggle("is-active", c.dataset.mode === mode);
  });
  const wrap = document.getElementById("dateSelWrap");
  if (wrap) wrap.classList.toggle("is-dim", mode.startsWith("bank-"));
}

function startQuiz() {
  startQuizFor($("dateSel").value, state.mode);
}
function startQuizFor(date, mode) {
  const useMode = mode || "all";
  let qs;
  if (useMode.startsWith("bank-")) {
    state.lastDay = date;
    state.lastMode = useMode;
    const size = useMode === "bank-week" ? 30 : BANK_SAMPLE_SIZE;
    qs = buildBankQuestions(useMode, size);
  } else {
    const day = DAILY_QUIZZES.find(d => d.date === date);
    if (!day) return;
    state.lastDay = date;
    state.lastMode = useMode;
    qs = buildQuestions(day, useMode);
  }
  if (qs.length === 0) return;
  state.queue = qs.slice();
  state.total = qs.length;
  state.asked = 0;
  state.uniqueAsked = 0;
  state.askedKeys = new Set();
  state.firstTryRight = 0;
  state.attempts = 0;
  state.correctAttempts = 0;
  state.boxIndex = new Map();
  state.missed = [];
  renderQBoxes();
  state.awaitingAdvance = false;
  $("screen-start").classList.add("hidden");
  $("screen-end").classList.add("hidden");
  $("screen-quiz").classList.remove("hidden");
  $("feedback").innerHTML = "";
  $("advanceWrap").classList.add("hidden");
  nextQuestion();
}

function renderQBoxes() {
  const wrap = $("qBoxes");
  wrap.innerHTML = "";
  for (let i = 0; i < state.total; i++) {
    const b = document.createElement("div");
    b.className = "qbox";
    b.dataset.idx = i;
    wrap.appendChild(b);
  }
}

function markBox(idx, cls) {
  if (idx == null) return;
  const b = $("qBoxes").children[idx];
  if (!b) return;
  b.classList.remove("is-right", "is-wrong");
  b.classList.add(cls);
}

function highlightCurrentBox(idx) {
  const boxes = $("qBoxes").children;
  for (let i = 0; i < boxes.length; i++) boxes[i].classList.remove("is-current");
  if (idx != null && boxes[idx]) boxes[idx].classList.add("is-current");
}

function nextQuestion() {
  $("feedback").innerHTML = "";
  $("answerInput").value = "";
  $("answerInput").disabled = false;
  $("submitBtn").disabled = false;
  $("skipBtn").disabled = false;
  $("advanceWrap").classList.add("hidden");
  state.awaitingAdvance = false;

  if (state.queue.length === 0) return finish();

  state.current = state.queue.shift();
  state.asked++;
  const qKey = state.current.kind + "|" + state.current.prompt;
  if (state.askedKeys.has(qKey)) {
    state.currentFirstTry = false;
  } else {
    state.askedKeys.add(qKey);
    state.boxIndex.set(qKey, state.uniqueAsked);
    state.uniqueAsked++;
    state.currentFirstTry = true;
  }
  highlightCurrentBox(state.boxIndex.get(qKey));

  const head = $("qhead");
  head.classList.remove("is-verb", "is-adj", "is-verb-conj", "is-sentence");
  if (state.current.kind === "verb")      head.classList.add("is-verb");
  if (state.current.kind === "adj")       head.classList.add("is-adj");
  if (state.current.kind === "verb-conj") head.classList.add("is-verb-conj");
  if (state.current.kind === "sentence")  head.classList.add("is-sentence");

  $("formTag").textContent = state.current.type;
  const callout = $("formCallout");
  callout.textContent = state.current.form || "";
  callout.classList.remove("entall", "flertall", "adj-inflect", "is-hidden");
  if (state.current.formClass) callout.classList.add(state.current.formClass);
  if (!state.current.showCallout) callout.classList.add("is-hidden");

  const repeats = Math.max(0, state.queue.length - (state.total - state.asked));
  $("countTag").textContent = state.asked + " / " + state.total +
    (repeats > 0 ? "  +" + repeats : "");

  const done = state.total - state.queue.length - 1;
  const denom = state.total + state.missed.length;
  $("bar").style.width = Math.min(100, Math.round(100 * Math.max(0,done) / Math.max(1,denom))) + "%";

  $("qText").textContent = state.current.prompt;
  $("answerInput").focus();
}

// ── Italian Text-to-Speech (Web Speech API) ────────
const TTS = {
  enabled: (localStorage.getItem("ttsEnabled") !== "0"),
  voice: null,
  ready: false,
  pickVoice() {
    if (!("speechSynthesis" in window)) return;
    const voices = speechSynthesis.getVoices();
    if (!voices.length) return;
    const it = voices.filter(v => (v.lang || "").toLowerCase().startsWith("it"));
    const preferred = ["Alice", "Luca", "Federica", "Paola", "Tessa", "Google italiano"];
    for (const name of preferred) {
      const found = it.find(v => v.name.includes(name));
      if (found) { this.voice = found; this.ready = true; return; }
    }
    this.voice = it[0] || null;
    this.ready = !!this.voice;
  },
  speak(text) {
    if (!this.enabled || !text || !("speechSynthesis" in window)) return;
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "it-IT";
      if (this.voice) u.voice = this.voice;
      u.rate = 0.92;
      u.pitch = 1.0;
      speechSynthesis.speak(u);
    } catch (e) {}
  },
  stop() {
    if ("speechSynthesis" in window) speechSynthesis.cancel();
  },
  toggle() {
    this.enabled = !this.enabled;
    localStorage.setItem("ttsEnabled", this.enabled ? "1" : "0");
    if (!this.enabled) this.stop();
    this.syncButton();
  },
  syncButton() {
    const b = document.getElementById("ttsToggle");
    if (!b) return;
    b.textContent = this.enabled ? "🔊 Lyd" : "🔇 Lyd";
    b.classList.toggle("is-off", !this.enabled);
  }
};
if ("speechSynthesis" in window) {
  TTS.pickVoice();
  speechSynthesis.onvoiceschanged = () => TTS.pickVoice();
}

function spokenTextFor(q) {
  if (!q) return "";
  if (q.kind === "sentence") return q.itFull || q.answer || "";
  return q.answer || "";
}

function ttsAttr(text) {
  return (text || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function tw(word) {
  if (!word) return "";
  const attr = ttsAttr(word);
  return "<span class='tts-word' data-tts=\"" + attr + "\" title='Klikk for å høre uttalen'>" + word + "</span>";
}

function submitAnswer() {
  if (state.awaitingAdvance) return;
  const rawGiven = $("answerInput").value;
  let given = norm(rawGiven);
  const correct = norm(state.current.answer);

  if (state.current.kind === "verb-conj") {
    const pronounsByIdx = [
      ["io"],
      ["tu"],
      ["lui","lei","egli","ella"],
      ["noi"],
      ["voi"],
      ["loro","essi","esse"]
    ];
    const allowed = pronounsByIdx[state.current.personIdx] || [];
    for (const pr of allowed) {
      if (given.startsWith(pr + " ")) {
        given = given.slice(pr.length + 1).trim();
        break;
      }
    }
  }

  $("answerInput").disabled = true;
  $("submitBtn").disabled = true;
  $("skipBtn").disabled = true;
  state.awaitingAdvance = true;
  $("advanceWrap").classList.remove("hidden");
  $("nextBtn").focus();

  let fullAnswer, missedAnswer;
  if (state.current.kind === "noun") {
    fullAnswer =
      "<span class='answer'>" + tw(state.current.sg) + "</span>" +
      " <span style='color:var(--muted)'>·</span> " +
      "<span class='answer'>" + tw(state.current.pl) + "</span>";
    missedAnswer = state.current.sg + " · " + state.current.pl;
  } else if (state.current.kind === "adj") {
    fullAnswer =
      "<span class='adj-grid'>" +
        "<span class='adj-cell'><em>m. sg.</em><b>" + tw(state.current.ms) + "</b></span>" +
        "<span class='adj-cell'><em>f. sg.</em><b>" + tw(state.current.fs) + "</b></span>" +
        "<span class='adj-cell'><em>m. pl.</em><b>" + tw(state.current.mp) + "</b></span>" +
        "<span class='adj-cell'><em>f. pl.</em><b>" + tw(state.current.fp) + "</b></span>" +
      "</span>";
    missedAnswer = state.current.ms + " / " + state.current.fs +
                 " · " + state.current.mp + " / " + state.current.fp;
  } else if (state.current.kind === "verb-conj") {
    const c = state.current.conjAll;
    const labels = ["io","tu","lui/lei","noi","voi","loro"];
    let grid = "<span class='adj-grid verb-grid'>";
    const order = [0, 3, 1, 4, 2, 5];
    for (const i of order) {
      grid += "<span class='adj-cell'><em>" + labels[i] + "</em><b>" + tw(c[i]) + "</b></span>";
    }
    grid += "</span>";
    fullAnswer =
      "<span class='answer'>" + tw(state.current.answer) + "</span>" +
      "<div style='font-family:\"Geist Mono\",monospace;font-size:11px;color:var(--muted);letter-spacing:0.04em;margin:10px 0 4px'>" +
        state.current.noInfinitive + " · " + tw(state.current.infinitive) +
      "</div>" + grid;
    missedAnswer = state.current.answer + " (" + state.current.infinitive + ")";
  } else if (state.current.kind === "sentence") {
    fullAnswer = "<span class='answer'>" + tw(state.current.itFull) + "</span>";
    missedAnswer = state.current.itFull;
  } else {
    fullAnswer = "<span class='answer'>" + tw(state.current.answer) + "</span>";
    missedAnswer = state.current.answer;
  }

  state.attempts++;
  const boxIdx = state.boxIndex.get(state.current.kind + "|" + state.current.prompt);
  const spoken = spokenTextFor(state.current);
  if (given === correct) {
    state.correctAttempts++;
    if (state.currentFirstTry) state.firstTryRight++;
    markBox(boxIdx, "is-right");
    showFeedback(true,
      "Riktig &nbsp; " + fullAnswer +
      "<span class='nudge'>Trykk Enter for å fortsette · klikk et ord for å høre uttalen</span>");
    TTS.speak(spoken);
  } else {
    if (state.currentFirstTry) markBox(boxIdx, "is-wrong");
    state.currentFirstTry = false;
    const missKey = state.current.kind + "|" + state.current.prompt;
    let entry = state.missed.find(m => m.key === missKey);
    if (!entry) {
      entry = {
        key: missKey,
        prompt: state.current.prompt,
        answer: missedAnswer,
        tag: state.current.tag,
        count: 0,
        wrongAnswers: []
      };
      state.missed.push(entry);
    }
    entry.count++;
    entry.wrongAnswers.push(rawGiven.trim() === "" ? "(blankt)" : rawGiven.trim());
    state.queue.push(state.current);
    showFeedback(false,
      "Feil — riktig svar er " + fullAnswer +
      "<span class='nudge'>Spørsmålet kommer tilbake. Trykk Enter for å fortsette · klikk et ord for å høre uttalen</span>");
    TTS.speak(spoken);
  }
}

function showFeedback(good, html) {
  const el = $("feedback");
  el.className = "feedback " + (good ? "good" : "bad");
  el.innerHTML = html;
}

function advance() {
  if (!state.awaitingAdvance) return;
  nextQuestion();
}

function finish(interrupted) {
  $("screen-quiz").classList.add("hidden");
  $("screen-end").classList.remove("hidden");

  const seen = state.uniqueAsked;
  const partial = interrupted && seen < state.total;

  $("end-title-el").textContent = partial ? "Avbrutt" : "Ferdig";
  $("end-sub-el").textContent   = partial
    ? "Du svarte på " + seen + " av " + state.total + " spørsmål."
    : "Her er hvordan det gikk.";

  $("sTotal").textContent = partial ? (seen + " / " + state.total) : state.total;
  $("sFirst").textContent = state.firstTryRight;
  const acc = state.attempts ? Math.round(100 * state.correctAttempts / state.attempts) : 0;
  $("sAcc").textContent = acc + "%";

  const wrap = $("missedWrap");
  if (state.missed.length === 0 && seen > 0) {
    wrap.innerHTML = "<p style='color:var(--green-d);font-weight:500;margin:6px 0 22px'>Ingen feil — perfekt.</p>";
  } else if (state.missed.length === 0) {
    wrap.innerHTML = "";
  } else {
    const sorted = [...state.missed].sort((a,b) => b.count - a.count);
    const totalMisses = sorted.reduce((s,m) => s + m.count, 0);
    let html =
      "<div class='missed-head'>" +
        "<p class='missed-title'>Ord du bommet på</p>" +
        "<span class='missed-total'>" + totalMisses + " bom totalt</span>" +
      "</div>" +
      "<div class='miss-chart'>";
    for (const m of sorted) {
      const units = Array(m.count).fill("<span class='unit'></span>").join("");
      const attempts = (m.wrongAnswers || []);
      let attemptsHtml = "";
      if (attempts.length > 0) {
        attemptsHtml = "<ol>" + attempts.map(a =>
          "<li>" + escapeHtml(a) + "</li>"
        ).join("") + "</ol>";
      } else {
        attemptsHtml = "<ol><li class='empty'>Ingen svar lagret.</li></ol>";
      }
      html +=
        "<div class='bar-row' role='button' tabindex='0'>" +
          "<div class='bar-word'>" + escapeHtml(m.prompt) +
            "<span class='bar-tag'>" + m.tag + "</span>" +
          "</div>" +
          "<div class='bar-units'>" + units + "</div>" +
          "<div class='bar-count'>" + m.count + "</div>" +
          "<div class='bar-answer'>" + escapeHtml(m.answer) + "</div>" +
          "<div class='bar-chev'></div>" +
          "<div class='bar-attempts'>" +
            "<p class='attempts-title'>Dine svar (" + attempts.length + ")</p>" +
            attemptsHtml +
          "</div>" +
        "</div>";
    }
    html += "</div>";
    wrap.innerHTML = html;
    wrap.querySelectorAll(".bar-row").forEach(row => {
      row.addEventListener("click", () => row.classList.toggle("is-open"));
      row.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          row.classList.toggle("is-open");
        }
      });
    });
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[c]));
}

function goHome() {
  $("screen-quiz").classList.add("hidden");
  $("screen-end").classList.add("hidden");
  $("screen-start").classList.remove("hidden");
  $("dateSel").focus();
}

/* ── Global keyboard ──────────────────────────────── */
function globalKeys(e) {
  const onStart = !$("screen-start").classList.contains("hidden");
  const onQuiz  = !$("screen-quiz").classList.contains("hidden");
  const onEnd   = !$("screen-end").classList.contains("hidden");

  if (onStart) {
    if (e.key === "Enter") {
      e.preventDefault();
      if ($("dayListWrap").classList.contains("is-open")) {
        $("dayListToggle").click();
      } else {
        startQuiz();
      }
      return;
    }
    if (e.key === "ArrowDown" || e.key === "ArrowUp") {
      const sel = $("dateSel");
      const listOpen = $("dayListWrap").classList.contains("is-open");
      if (document.activeElement !== sel || listOpen) {
        e.preventDefault();
        const i = sel.selectedIndex;
        if (e.key === "ArrowDown" && i < sel.options.length - 1) sel.selectedIndex = i + 1;
        if (e.key === "ArrowUp"   && i > 0)                       sel.selectedIndex = i - 1;
        updateMeta();
        updateDateComboLabel();
        if (listOpen) {
          renderDayList();
          showDatePreview(sel.value);
          const row = document.querySelector('#dayList .day-row[data-date="' + sel.value + '"]');
          if (row) row.scrollIntoView({ block: "nearest" });
        }
      }
      return;
    }
    const map = {
      "1":"nouns", "2":"adjectives", "3":"verbs", "4":"all",
      "5":"verbs-conj", "6":"sentences",
      "7":"bank-nouns", "8":"bank-adjectives", "9":"bank-verbs", "0":"bank-all"
    };
    if (map[e.key]) { e.preventDefault(); setMode(map[e.key]); }
    return;
  }

  if (onQuiz) {
    if (e.key === "Escape") { e.preventDefault(); finish(true); return; }
    if (e.key === "Enter" && state.awaitingAdvance) {
      e.preventDefault(); advance();
    }
    return;
  }

  if (onEnd) {
    if (e.key === "r" || e.key === "R") { e.preventDefault(); $("againBtn").click(); }
    if (e.key === "Escape") { e.preventDefault(); goHome(); }
  }
}

init();
</script>
